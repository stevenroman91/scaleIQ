name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/scaleiq_test"
      NEXTAUTH_SECRET: "ci-test-secret"
      NEXTAUTH_URL: "http://localhost:3000"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scaleiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript type check
        id: typecheck
        run: npx tsc --noEmit

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate

      - name: Build Next.js
        id: build
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      # On failure, notify Paperclip to create a bug-fix task
      - name: Notify Paperclip on build failure
        if: failure() && github.event_name == 'push'
        env:
          PAPERCLIP_WEBHOOK_URL: ${{ secrets.PAPERCLIP_CI_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$PAPERCLIP_WEBHOOK_URL" ]; then
            echo "PAPERCLIP_CI_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi
          curl -sS -X POST "$PAPERCLIP_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"scaleIQ\",
              \"commit\": \"$COMMIT_SHA\",
              \"message\": $(echo "$COMMIT_MSG" | head -1 | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))"),
              \"author\": \"$COMMIT_AUTHOR\",
              \"workflowUrl\": \"$WORKFLOW_URL\",
              \"failedStep\": \"build or typecheck\"
            }" || echo "Failed to notify Paperclip"
